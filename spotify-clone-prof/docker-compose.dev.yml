networks:
  spotify-network:
    name: spotify-network
    driver: bridge

services:
  spotify-clonep:
    container_name: spotify-clonep-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: build
    image: spotify-clonep-dev:latest
    command: ["npm", "run", "dev"]
    networks:
      - spotify-network
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
