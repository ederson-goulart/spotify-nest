networks:
  spotify-network:
    name: spotify-network
    external: true

volumes:
  minio-data:
    name: minio-data

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - spotify-network
    volumes:
      - minio-data:/data

  minio-s3:
    image: minio/mc:latest
    depends_on:
      - minio
    restart: "no"
    env_file:
      - .env
    networks:
      - spotify-network
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done &&
      mc mb -p local/uploads || true &&
      mc anonymous set download local/uploads &&
      echo 'Bucket criado e público!'
      "
