networks:
  spotify-network:
    name: spotify-network
    external: true

volumes:
  minio-data:
    name: minio-data

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}

    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - spotify-network
    volumes:
      - minio-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9000/minio/health/live || exit 1",
        ]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s

  minio-s3:
    image: minio/mc:latest
    restart: "no"
    env_file:
      - .env
    networks:
      - spotify-network
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do
        echo 'Aguardando MinIO aceitar conexoes...';
        sleep 2;
      done;
      mc mb -p local/uploads || true;
      mc anonymous set download local/uploads || true;
      echo 'Bucket criado e publico!';
      "
