networks:
  spotify-network:
    external: true

services:
  minio:
    image: minio/minio:latest
    container_name: minio

    command: server /data --console-address ":9001"

    restart: unless-stopped

    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data

    networks:
      - spotify-network

    ports:
      - "9000:9000"
      - "9001:9001"

volumes:
  minio-data:
    name: minio-data
